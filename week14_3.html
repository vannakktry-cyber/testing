<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check if form is fill</title>
    <link href="assets/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container mt-3">
        <form class="needs-validated" novalidated>
            <div class="mb-3">
                <label for="fName" class="form-label">
                    First Name:
                </label>
                <input type="texte" id="fName" class="form-control" placeholder="Enter First Name" required>
                <div class="valid-feedback">Control Valid</div>
                <div class="invalid-feedback">Fill this First Name</div>
            </div>
            <!--  form check-->
            <div class="mb-3">
                <label for="fcheck" class="form-check-label">
                    Accept on ...
                </label>p
                <input type="checkbox" id="fcheck" class="form-check-input" required>
                <div class="valid-feedback">Valid.</div>
                <div class="invalid-feedback">Check to continue.</div>
            </div>
            <!-- form selection -->
            <div class="mb-3">
                <label for="gender"> Gender: </label>
                <select id="gender" class="form-select" required>
                    <option value=""> Choose... </option>
                    <option value="F"> female </option>
                    <option value="M"> male </option>
                    <div class="invalid-feedback">Select Gender.</div>
                </select>
            </div>
            <!-- Email Form -->
             <div class="mb-3">
                <label for="fName" class="form-label"> Email: </label>
                <input type="email" id="femail" class="form-control" placeholder="you@example.com" required>
                <div class="invalid-feedback"> Invalid email. </div>
                
             </div>
              <!-- password -->
             <div class="mb-3">
                <label for="fpassword" class="form-label"> Password: </label>
                <input type="password" id="fpassword" class="form-control"  required minlength="6">
                <div class="invalid-feedback"> Password must be at lease 6 characters. </div>
                
             </div>
        </form>
        <input type="submit" value="Submit" class="btn btn-primary">
    </div>
    
</body>
<script>
      // Bootstrap validation script
      (() => {
        "use strict";
        const forms = document.querySelectorAll(".needs-validation");
        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              form.classList.add("was-validated");
            },
            false
          );
        });
      })();
    </script>
</html>
